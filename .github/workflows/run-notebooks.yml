name: Run notebooks

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  execute:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Execute notebooks
        run: |
          mkdir -p _executed
          for nb in task_*.ipynb; do
            echo "=== $nb ==="
            jupyter nbconvert \
              --to notebook \
              --execute \
              --ExecutePreprocessor.timeout=600 \
              --output-dir _executed \
              "$nb"
          done
